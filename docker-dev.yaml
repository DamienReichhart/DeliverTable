name: delivertable-dev

services:

  # ── Reverse Proxy ────────────────────────────────────────────
  proxy:
    container_name: dt-proxy-dev
    build:
      context: .
      dockerfile: docker/images/proxy.dev.dockerfile
    ports:
      - "${PROXY_PORT}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Blazor WASM Frontend ────────────────────────────────────
  frontend:
    container_name: dt-frontend-dev
    build:
      context: .
      dockerfile: docker/images/frontend.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
      - ./docker/config/dev/blazor/appconfig.Development.json:/src/DeliverTableClient/wwwroot/appconfig.Development.json:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5147
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "true"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.20
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5147 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # ── ASP.NET Core Web API Backend ────────────────────────────
  backend:
    container_name: dt-backend-dev
    build:
      context: .
      dockerfile: docker/images/backend.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5268
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "true"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      ObjectStorage__ServiceUrl: http://192.168.60.30:3900
      ObjectStorage__AccessKey: ${GARAGE_S3_ACCESS_KEY}
      ObjectStorage__SecretKey: ${GARAGE_S3_SECRET_KEY}
      ObjectStorage__BucketName: ${GARAGE_BUCKET_NAME}
      ObjectStorage__ForcePathStyle: "true"
    depends_on:
      database:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.30
      dt-backend-net:
        ipv4_address: 192.168.60.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5268/api/v1/Health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────
  database:
    container_name: dt-database-dev
    build:
      context: .
      dockerfile: docker/images/database.dev.dockerfile
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Object Storage (Garage S3) ────────────────────────────────
  garage:
    container_name: dt-garage-dev
    build:
      context: .
      dockerfile: docker/images/garage.dev.dockerfile
    volumes:
      - garage-data:/var/lib/garage
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_BUCKET_NAME: ${GARAGE_BUCKET_NAME}
    ports:
      - "${GARAGE_API_PORT:-3900}:3900"
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.30
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3903/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── S3 Manager (Web UI for Garage) ──────────────────────────
  s3-manager:
    container_name: dt-s3manager-dev
    image: cloudlena/s3manager:latest
    environment:
      ENDPOINT: 192.168.60.30:3900
      ACCESS_KEY_ID: ${GARAGE_S3_ACCESS_KEY}
      SECRET_ACCESS_KEY: ${GARAGE_S3_SECRET_KEY}
      REGION: garage
      USE_SSL: "false"
      LIST_RECURSIVE: "true"
      ALLOW_DELETE: "true"
      FORCE_DOWNLOAD: "false"
    ports:
      - "${S3_MANAGER_PORT}:8080"
    depends_on:
      garage:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.40
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

networks:
  dt-frontend-net:
    name: dt-frontend-dev
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.1
  dt-backend-net:
    name: dt-backend-dev
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.60.0/24
          gateway: 192.168.60.1

volumes:
  postgres-data:
    name: dt-postgres-data-dev
  garage-data:
    name: dt-garage-data-dev
  nuget-cache:
    name: dt-nuget-cache-dev
