name: delivertable-dev

services:

  # ── Reverse Proxy ────────────────────────────────────────────
  proxy:
    container_name: dt-proxy-dev
    build:
      context: .
      dockerfile: docker/images/proxy.dev.dockerfile
    ports:
      - "${PROXY_PORT}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Blazor WASM Frontend ────────────────────────────────────
  frontend:
    container_name: dt-frontend-dev
    build:
      context: .
      dockerfile: docker/images/frontend.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
      - ./docker/config/dev/blazor/appconfig.Development.json:/src/DeliverTableClient/wwwroot/appconfig.Development.json:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5147
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "true"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.20
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5147 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # ── ASP.NET Core Web API Backend ────────────────────────────
  backend:
    container_name: dt-backend-dev
    build:
      context: .
      dockerfile: docker/images/backend.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5268
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "true"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      CONNECTION_STRING_REDIS: ${CONNECTION_STRING_REDIS}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      OPENAPI_ENABLE_DOCUMENTATION: ${OPENAPI_ENABLE_DOCUMENTATION}
      OBJECT_STORAGE_SERVICE_URL: ${OBJECT_STORAGE_SERVICE_URL}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE:-0.10}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PLATFORM_LEGAL_NAME: ${PLATFORM_LEGAL_NAME}
      PLATFORM_LEGAL_FORM: ${PLATFORM_LEGAL_FORM}
      PLATFORM_SIRET: ${PLATFORM_SIRET}
      PLATFORM_VAT_NUMBER: ${PLATFORM_VAT_NUMBER}
      PLATFORM_ADDRESS: ${PLATFORM_ADDRESS}
      PLATFORM_VAT_APPLICABLE: ${PLATFORM_VAT_APPLICABLE:-true}
      ADMIN_DISPUTE_EMAIL: ${ADMIN_DISPUTE_EMAIL}
    depends_on:
      database:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      dt-frontend-net:
        ipv4_address: 192.168.50.30
      dt-backend-net:
        ipv4_address: 192.168.60.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5268/api/v1/Health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────
  database:
    container_name: dt-database-dev
    build:
      context: .
      dockerfile: docker/images/database.dev.dockerfile
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis (in-memory cache) ─────────────────────────────────
  redis:
    container_name: dt-redis-dev
    build:
      context: .
      dockerfile: docker/images/redis.dev.dockerfile
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.50
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Object Storage (Garage S3) ────────────────────────────────
  garage:
    container_name: dt-garage-dev
    build:
      context: .
      dockerfile: docker/images/garage.dev.dockerfile
    volumes:
      - garage-data:/var/lib/garage
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_BUCKET_NAME: ${GARAGE_BUCKET_NAME}
    ports:
      - "${GARAGE_API_PORT:-3900}:3900"
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.30
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3903/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── S3 Manager (Web UI for Garage) ──────────────────────────
  s3-manager:
    container_name: dt-s3manager-dev
    image: cloudlena/s3manager:latest
    environment:
      ENDPOINT: 192.168.60.30:3900
      ACCESS_KEY_ID: ${GARAGE_S3_ACCESS_KEY}
      SECRET_ACCESS_KEY: ${GARAGE_S3_SECRET_KEY}
      REGION: garage
      USE_SSL: "false"
      LIST_RECURSIVE: "true"
      ALLOW_DELETE: "true"
      FORCE_DOWNLOAD: "false"
    ports:
      - "${S3_MANAGER_PORT}:8080"
    depends_on:
      garage:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.40
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── RabbitMQ (Message Broker) ──────────────────────────────────
  rabbitmq:
    container_name: dt-rabbitmq-dev
    build:
      context: .
      dockerfile: docker/images/rabbitmq.dev.dockerfile
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.70
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Background Worker ─────────────────────────────────────────
  worker:
    container_name: dt-worker-dev
    build:
      context: .
      dockerfile: docker/images/worker.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-DeliverTable}
      SMTP_MAX_SENDS_PER_MINUTE: ${SMTP_MAX_SENDS_PER_MINUTE:-5}
      NEUTRALIZE_EMAIL: ${NEUTRALIZE_EMAIL:-false}
      PLATFORM_LEGAL_NAME: ${PLATFORM_LEGAL_NAME}
      PLATFORM_LEGAL_FORM: ${PLATFORM_LEGAL_FORM}
      PLATFORM_SIRET: ${PLATFORM_SIRET}
      PLATFORM_VAT_NUMBER: ${PLATFORM_VAT_NUMBER}
      PLATFORM_ADDRESS: ${PLATFORM_ADDRESS}
      PLATFORM_VAT_APPLICABLE: ${PLATFORM_VAT_APPLICABLE:-true}
      OBJECT_STORAGE_SERVICE_URL: ${OBJECT_STORAGE_SERVICE_URL}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-garage}
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.80
    restart: unless-stopped

  # ── Background Scheduler ─────────────────────────────────────
  scheduler:
    container_name: dt-scheduler-dev
    build:
      context: .
      dockerfile: docker/images/scheduler.dev.dockerfile
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      OBJECT_STORAGE_SERVICE_URL: ${OBJECT_STORAGE_SERVICE_URL}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-garage}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ADMIN_DISPUTE_EMAIL: ${ADMIN_DISPUTE_EMAIL}
      PLATFORM_LEGAL_NAME: ${PLATFORM_LEGAL_NAME}
      PLATFORM_LEGAL_FORM: ${PLATFORM_LEGAL_FORM}
      PLATFORM_SIRET: ${PLATFORM_SIRET}
      PLATFORM_VAT_NUMBER: ${PLATFORM_VAT_NUMBER}
      PLATFORM_ADDRESS: ${PLATFORM_ADDRESS}
      PLATFORM_VAT_APPLICABLE: ${PLATFORM_VAT_APPLICABLE:-true}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE:-0.10}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 192.168.60.90
    restart: unless-stopped

networks:
  dt-frontend-net:
    name: dt-frontend-dev
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.1
  dt-backend-net:
    name: dt-backend-dev
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.60.0/24
          gateway: 192.168.60.1

volumes:
  postgres-data:
    name: dt-postgres-data-dev
  garage-data:
    name: dt-garage-data-dev
  rabbitmq-data:
    name: dt-rabbitmq-data-dev
  nuget-cache:
    name: dt-nuget-cache-dev
