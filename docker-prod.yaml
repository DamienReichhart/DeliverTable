name: delivertable-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  tunnel:
    container_name: dt-tunnel-prod
    build:
      context: .
      dockerfile: docker/images/tunnel.prod.dockerfile
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      dt-public-net:
        ipv4_address: 172.30.0.20
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always

  proxy:
    container_name: dt-proxy-prod
    build:
      context: .
      dockerfile: docker/images/proxy.prod.dockerfile
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      dt-public-net:
        ipv4_address: 172.30.0.10
      dt-frontend-net:
        ipv4_address: 172.31.0.10
    ports:
      - "${PROXY_PORT}:80"
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=10m
      - /var/run:size=1m
      - /tmp:size=5m

  frontend:
    container_name: dt-frontend-prod
    build:
      context: .
      dockerfile: docker/images/frontend.prod.dockerfile
    networks:
      dt-frontend-net:
        ipv4_address: 172.31.0.20
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=10m,uid=101,gid=101
      - /var/run:size=1m,uid=101,gid=101
      - /tmp:size=5m,uid=101,gid=101

  backend:
    container_name: dt-backend-prod
    build:
      context: .
      dockerfile: docker/images/backend.prod.dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      CONNECTION_STRING_REDIS: 172.32.0.40:6379,password=${REDIS_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      OPENAPI_ENABLE_DOCUMENTATION: ${OPENAPI_ENABLE_DOCUMENTATION}
      OBJECT_STORAGE_SERVICE_URL: ${OBJECT_STORAGE_SERVICE_URL}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ADMIN_DISPUTE_EMAIL: ${ADMIN_DISPUTE_EMAIL}
    depends_on:
      database:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      dt-frontend-net:
        ipv4_address: 172.31.0.30
      dt-backend-net:
        ipv4_address: 172.32.0.10
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8080/api/v1/Health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=50m

  database:
    container_name: dt-database-prod
    build:
      context: .
      dockerfile: docker/images/database.prod.dockerfile
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    logging: *default-logging
    restart: always

  redis:
    container_name: dt-redis-prod
    build:
      context: .
      dockerfile: docker/images/redis.prod.dockerfile
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.40
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=1m

  garage:
    container_name: dt-garage-prod
    build:
      context: .
      dockerfile: docker/images/garage.prod.dockerfile
    volumes:
      - garage-data:/var/lib/garage
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_BUCKET_NAME: ${GARAGE_BUCKET_NAME}
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.30
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:3903/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always

  rabbitmq:
    container_name: dt-rabbitmq-prod
    build:
      context: .
      dockerfile: docker/images/rabbitmq.prod.dockerfile
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.50
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    logging: *default-logging
    restart: always

  worker:
    container_name: dt-worker-prod
    build:
      context: .
      dockerfile: docker/images/worker.prod.dockerfile
    environment:
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-DeliverTable}
      SMTP_MAX_SENDS_PER_MINUTE: ${SMTP_MAX_SENDS_PER_MINUTE:-5}
      NEUTRALIZE_EMAIL: ${NEUTRALIZE_EMAIL:-false}
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.60
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=50m

  scheduler:
    container_name: dt-scheduler-prod
    build:
      context: .
      dockerfile: docker/images/scheduler.prod.dockerfile
    environment:
      CONNECTION_STRING_DATABASE: ${CONNECTION_STRING_DATABASE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      database:
        condition: service_healthy
    networks:
      dt-backend-net:
        ipv4_address: 172.32.0.70
    cap_drop:
      - ALL
    logging: *default-logging
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=50m

networks:
  dt-public-net:
    name: dt-public-prod
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

  dt-frontend-net:
    name: dt-frontend-prod
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24
          gateway: 172.31.0.1

  dt-backend-net:
    name: dt-backend-prod
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.32.0.0/24
          gateway: 172.32.0.1

volumes:
  postgres-data:
    name: dt-postgres-data-prod
  garage-data:
    name: dt-garage-data-prod
  rabbitmq-data:
    name: dt-rabbitmq-data-prod
