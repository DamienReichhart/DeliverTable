# ─────────────────────────────────────────────────────────────
# PostgreSQL – Development Configuration
# Tuned for developer convenience: verbose logging, relaxed
# durability (safe for ephemeral dev data).
# ─────────────────────────────────────────────────────────────

# ── Connection ──────────────────────────────────────────────
listen_addresses     = '*'
port                 = 5432
max_connections      = 50

# ── Memory ──────────────────────────────────────────────────
shared_buffers       = 128MB
work_mem             = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 256MB

# ── Logging (verbose for debugging) ─────────────────────────
logging_collector          = on
log_directory              = 'log'
log_filename               = 'postgresql-%Y-%m-%d.log'
log_statement              = 'all'
log_duration               = on
log_min_duration_statement = 0
log_line_prefix            = '%t [%p] %u@%d '
log_connections            = on
log_disconnections         = on
log_lock_waits             = on

# ── WAL / Durability ───────────────────────────────────────
wal_level          = minimal
max_wal_senders    = 0
synchronous_commit = off

# ── Locale ──────────────────────────────────────────────────
timezone = 'UTC'
