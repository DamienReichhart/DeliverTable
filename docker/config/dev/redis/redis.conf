# DeliverTable Redis – Development (in-memory only)

# ── Network ──────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 128
timeout 300
tcp-keepalive 60

# ── Persistence: disabled ────────────────────────────────────────
save ""
appendonly no
rdbchecksum no

# ── Memory ───────────────────────────────────────────────────────
maxmemory 128mb
maxmemory-policy allkeys-lru

# ── Logging ──────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Snapshotting safety net (disabled) ───────────────────────────
stop-writes-on-bgsave-error no

# ── Misc ─────────────────────────────────────────────────────────
databases 1
always-show-logo no
