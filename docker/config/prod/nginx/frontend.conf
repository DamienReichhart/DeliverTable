server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Blazor framework files are fingerprinted — cache aggressively
    location /_framework/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Service worker must never be cached to allow update propagation
    location = /service-worker.js {
        expires    -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /service-worker-assets.js {
        expires    -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static assets — moderate cache with revalidation
    location ~* \.(css|js|wasm|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        gzip_static on;
    }

    # Health check for Docker healthcheck probes
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Blazor WASM SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
