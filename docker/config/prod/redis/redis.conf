# DeliverTable Redis – Production (in-memory only)

# ── Network ──────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes
requirepass REDIS_PASSWORD_PLACEHOLDER
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Persistence: disabled ────────────────────────────────────────
save ""
appendonly no
rdbchecksum no

# ── Memory ───────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Logging ──────────────────────────────────────────────────────
loglevel warning
logfile ""

# ── Snapshotting safety net (disabled) ───────────────────────────
stop-writes-on-bgsave-error no

# ── Security hardening ───────────────────────────────────────────
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN REDIS_SHUTDOWN

# ── Misc ─────────────────────────────────────────────────────────
databases 1
always-show-logo no
