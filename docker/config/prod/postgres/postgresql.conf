# ─────────────────────────────────────────────────────────────
# PostgreSQL – Production Configuration
# Tuned for durability, reliability, and moderate throughput.
# Adjust shared_buffers and effective_cache_size to ~25% / ~75%
# of available RAM on the host.
# ─────────────────────────────────────────────────────────────

# ── Connection ──────────────────────────────────────────────
listen_addresses     = '*'
port                 = 5432
max_connections      = 200

# ── Memory ──────────────────────────────────────────────────
shared_buffers       = 256MB
work_mem             = 8MB
maintenance_work_mem = 128MB
effective_cache_size = 768MB

# ── Logging (errors + slow queries only) ────────────────────
logging_collector          = on
log_directory              = 'log'
log_filename               = 'postgresql-%Y-%m-%d.log'
log_statement              = 'ddl'
log_duration               = off
log_min_duration_statement = 500
log_line_prefix            = '%t [%p] %u@%d '
log_connections            = on
log_disconnections         = on
log_lock_waits             = on
log_temp_files             = 0

# ── WAL / Durability ───────────────────────────────────────
wal_level          = replica
max_wal_senders    = 3
synchronous_commit = on
checkpoint_timeout = 10min
max_wal_size       = 1GB
min_wal_size       = 200MB

# ── Planner ─────────────────────────────────────────────────
random_page_cost         = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Locale ──────────────────────────────────────────────────
timezone = 'UTC'
