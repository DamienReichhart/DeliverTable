version: 2

updates:
  # ── NuGet (.NET packages) ──────────────────────────────────────
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Paris"
    target-branch: "dev"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "nuget"
    groups:
      microsoft-framework:
        patterns:
          - "Microsoft.*"
          - "System.*"
        update-types:
          - "minor"
          - "patch"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
      testing:
        patterns:
          - "xunit*"
          - "Moq*"
          - "FluentAssertions*"
          - "coverlet*"
          - "Microsoft.NET.Test*"

  # ── Docker (base images) ──────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/docker/images"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Paris"
    target-branch: "dev"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
    groups:
      all-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
