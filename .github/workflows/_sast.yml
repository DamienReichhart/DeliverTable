name: SAST

on:
  workflow_call:

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    environment: CI
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci
