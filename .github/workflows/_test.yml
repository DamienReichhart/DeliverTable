name: Test

on:
  workflow_call:

env:
  COVERAGE_THRESHOLD: 80

jobs:
  test-and-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    environment: CI
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Run tests with coverage
        run: >-
          dotnet test DeliverTable.sln
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results
          --logger "console;verbosity=normal"
          --logger "trx;LogFilePrefix=results"

      - name: Generate coverage report
        if: always()
        run: >-
          reportgenerator
          "-reports:./test-results/**/coverage.cobertura.xml"
          "-targetdir:./coverage-report"
          "-reporttypes:Cobertura;MarkdownSummaryGithub;TextSummary"
          "-assemblyfilters:-DeliverTableTests"

      - name: Post coverage summary
        if: always()
        run: cat ./coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage threshold
        run: |
          line_coverage=$(grep -oP 'Line coverage: \K[0-9.]+' ./coverage-report/Summary.txt || echo "0")
          echo "Line coverage: ${line_coverage}%"

          below=$(awk "BEGIN {print (${line_coverage} < ${COVERAGE_THRESHOLD}) ? 1 : 0}")
          if [ "$below" -eq 1 ]; then
            echo "::error::Line coverage ${line_coverage}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/
          retention-days: 14
