name: Docker Build

on:
  workflow_call:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  docker-prod-build:
    name: Production Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Create build environment
        run: cp .env.example .env

      - name: Build all production images
        run: docker compose -f docker-prod.yaml build

      # ── Trivy: scan application images ──────────────────────────
      - name: Trivy scan – backend
        if: always() && !cancelled()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: delivertable-prod-backend
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-backend.sarif

      - name: Trivy scan – frontend
        if: always() && !cancelled()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: delivertable-prod-frontend
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-frontend.sarif

      - name: Trivy scan – proxy
        if: always() && !cancelled()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: delivertable-prod-proxy
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-proxy.sarif

      - name: Trivy scan – worker
        if: always() && !cancelled()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: delivertable-prod-worker
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-worker.sarif

      - name: Trivy scan – tunnel
        if: always() && !cancelled()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: delivertable-prod-tunnel
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-tunnel.sarif

      - name: Upload SARIF – backend
        if: always() && !cancelled() && hashFiles('trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload SARIF – frontend
        if: always() && !cancelled() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Upload SARIF – proxy
        if: always() && !cancelled() && hashFiles('trivy-proxy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-proxy.sarif
          category: trivy-proxy

      - name: Upload SARIF – worker
        if: always() && !cancelled() && hashFiles('trivy-worker.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload SARIF – tunnel
        if: always() && !cancelled() && hashFiles('trivy-tunnel.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-tunnel.sarif
          category: trivy-tunnel

      # ── SBOM: application images ────────────────────────────────
      - name: Generate SBOM – backend
        if: always()
        uses: anchore/sbom-action@v0
        with:
          image: delivertable-prod-backend
          artifact-name: sbom-backend.spdx.json
          output-file: sbom-backend.spdx.json

      - name: Generate SBOM – frontend
        if: always()
        uses: anchore/sbom-action@v0
        with:
          image: delivertable-prod-frontend
          artifact-name: sbom-frontend.spdx.json
          output-file: sbom-frontend.spdx.json

      - name: Generate SBOM – worker
        if: always()
        uses: anchore/sbom-action@v0
        with:
          image: delivertable-prod-worker
          artifact-name: sbom-worker.spdx.json
          output-file: sbom-worker.spdx.json

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: sbom-*.spdx.json
          retention-days: 14
