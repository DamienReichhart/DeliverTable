<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6470"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8772e"/>
    </marker>
    <linearGradient id="sprintGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf0e6"/>
      <stop offset="1" stop-color="#fbe2cd"/>
    </linearGradient>
    <style>
      .title  { font-size: 30px; font-weight: 700; fill: #2b3038; }
      .sub    { font-size: 15px; fill: #6b7280; }
      .stage  { font-size: 16px; font-weight: 600; fill: #ffffff; }
      .lbl    { font-size: 14px; font-weight: 600; fill: #2b3038; }
      .small  { font-size: 12px; fill: #5b6470; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="#f7f8fa"/>

  <!-- Header -->
  <text x="450" y="58" class="title center">Méthodologie Agile</text>
  <text x="450" y="86" class="sub center">Développement itératif et incrémental par sprints</text>

  <!-- ===== Backlog (left) ===== -->
  <g>
    <rect x="40" y="250" width="150" height="150" rx="14" fill="#ffffff" stroke="#d8dce2" stroke-width="2"/>
    <text x="115" y="285" class="lbl center">Product</text>
    <text x="115" y="304" class="lbl center">Backlog</text>
    <line x1="65" y1="322" x2="165" y2="322" stroke="#e3e6ea" stroke-width="1.5"/>
    <rect x="65" y="332" width="100" height="12" rx="3" fill="#fbe2cd"/>
    <rect x="65" y="350" width="100" height="12" rx="3" fill="#fbe2cd"/>
    <rect x="65" y="368" width="78"  height="12" rx="3" fill="#f0f1f3"/>
    <rect x="65" y="386" width="60"  height="12" rx="3" fill="#f0f1f3"/>
  </g>

  <!-- Backlog -> Sprint Planning -->
  <path d="M195 325 L255 325" fill="none" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Sprint cycle (center) ===== -->
  <circle cx="490" cy="335" r="170" fill="url(#sprintGrad)" stroke="#f3c9a4" stroke-width="2"/>
  <text x="490" y="320" class="lbl center" font-size="18">Sprint</text>
  <text x="490" y="344" class="small center">1 – 4 semaines</text>
  <text x="490" y="366" class="small center">itération</text>

  <!-- Circular flow arrows -->
  <g fill="none" stroke="#e8772e" stroke-width="3">
    <path d="M490 205 A130 130 0 0 1 600 270" marker-end="url(#arrowOrange)"/>
    <path d="M620 290 A130 130 0 0 1 600 400" marker-end="url(#arrowOrange)"/>
    <path d="M585 420 A130 130 0 0 1 490 465" marker-end="url(#arrowOrange)"/>
    <path d="M470 465 A130 130 0 0 1 380 400" marker-end="url(#arrowOrange)"/>
    <path d="M360 405 A130 130 0 0 1 380 270" marker-end="url(#arrowOrange)"/>
    <path d="M395 255 A130 130 0 0 1 480 205" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- Stage nodes around the circle -->
  <!-- top: Planifier -->
  <g>
    <circle cx="490" cy="195" r="40" fill="#2f6f8f"/>
    <text x="490" y="200" class="stage center">Planifier</text>
  </g>
  <!-- top-right: Concevoir -->
  <g>
    <circle cx="623" cy="270" r="40" fill="#3a8d6b"/>
    <text x="623" y="275" class="stage center">Concevoir</text>
  </g>
  <!-- bottom-right: Développer -->
  <g>
    <circle cx="623" cy="400" r="40" fill="#c9892b"/>
    <text x="623" y="405" class="stage center">Développer</text>
  </g>
  <!-- bottom: Tester -->
  <g>
    <circle cx="490" cy="475" r="40" fill="#8a4fb0"/>
    <text x="490" y="480" class="stage center">Tester</text>
  </g>
  <!-- bottom-left: Livrer -->
  <g>
    <circle cx="357" cy="400" r="40" fill="#c0432f"/>
    <text x="357" y="405" class="stage center">Livrer</text>
  </g>
  <!-- top-left: Réviser -->
  <g>
    <circle cx="357" cy="270" r="40" fill="#5b6470"/>
    <text x="357" y="275" class="stage center">Réviser</text>
  </g>

  <!-- Daily stand-up callout -->
  <g>
    <rect x="408" y="298" width="164" height="30" rx="15" fill="#ffffff" stroke="#f3c9a4" stroke-width="1.5"/>
    <text x="490" y="318" class="small center" font-weight="600">Daily stand-up</text>
  </g>

  <!-- ===== Increment (right) ===== -->
  <!-- Tester/Livrer -> Increment -->
  <path d="M662 335 L745 335" fill="none" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="745" y="270" width="120" height="130" rx="14" fill="#3a8d6b"/>
    <text x="805" y="320" class="stage center">Incrément</text>
    <text x="805" y="344" class="stage center" font-size="13">produit</text>
    <text x="805" y="372" class="center" font-size="12" fill="#d6efe3">potentiellement</text>
    <text x="805" y="388" class="center" font-size="12" fill="#d6efe3">livrable</text>
  </g>

  <!-- Feedback loop arrow: Increment back to Backlog -->
  <path d="M805 410 L805 575 L115 575 L115 410" fill="none" stroke="#e8772e" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <rect x="380" y="560" width="220" height="30" rx="15" fill="#fdf0e6" stroke="#f3c9a4" stroke-width="1.5"/>
  <text x="490" y="580" class="small center" font-weight="600" fill="#c0432f">Feedback &amp; rétrospective</text>

  <!-- Values footer -->
  <text x="450" y="628" class="small center" fill="#9aa1ab">
    Collaboration · Adaptation au changement · Livraison continue · Amélioration continue
  </text>
</svg>
