<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2c6cb0"/>
    </marker>
    <marker id="res" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2e8b57"/>
    </marker>
    <marker id="inj" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#c08a2e"/>
    </marker>
    <style>
      .nt { font-size: 15px; font-weight: 700; fill: #1f2933; }
      .ns { font-size: 11px; fill: #6b7280; }
      .nc { font-size: 10px; fill: #9aa5b1; font-style: italic; }
      .req{ stroke:#2c6cb0; stroke-width:1.8; fill:none; }
      .res{ stroke:#2e8b57; stroke-width:1.8; fill:none; }
      .lreq{ font-size:11px; fill:#2c6cb0; font-weight:600; }
      .lres{ font-size:11px; fill:#2e8b57; font-weight:600; }
      .zone{ font-size:14px; font-weight:700; letter-spacing:.5px; }
    </style>
  </defs>

  <rect width="1400" height="720" fill="#fbfcfd"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#1f2933">Injection de dépendances → DTO → traitement client</text>
  <text x="40" y="68" font-size="13" fill="#6b7280">Cycle de vie de GET /api/v1/Restaurant — flèches bleues = requête (→), flèches vertes = réponse (←)</text>

  <!-- Zone backgrounds -->
  <rect x="20" y="92" width="430" height="600" rx="14" fill="#e8f1fc" stroke="#4a90d9" stroke-width="1.4" stroke-dasharray="8 5"/>
  <text x="40" y="116" class="zone" fill="#2c6cb0">CLIENT — Blazor WASM (DeliverTableClient)</text>

  <rect x="470" y="92" width="910" height="600" rx="14" fill="#eaf6ec" stroke="#4caf7d" stroke-width="1.4" stroke-dasharray="8 5"/>
  <text x="490" y="116" class="zone" fill="#2e8b57">SERVEUR — ASP.NET Core (DeliverTableServer)</text>

  <!-- HTTP boundary -->
  <line x1="460" y1="120" x2="460" y2="660" stroke="#9aa5b1" stroke-width="1.4" stroke-dasharray="3 4"/>
  <text x="460" y="678" text-anchor="middle" font-size="11" fill="#6b7280">frontière réseau · HTTP · JSON</text>

  <!-- ── DI container (server) ── -->
  <rect x="500" y="150" width="640" height="74" rx="10" fill="#fff7ec" stroke="#d9a441" stroke-width="1.6"/>
  <text x="820" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6b15">Conteneur IoC — ServiceCollectionExtensions.AddDeliverTableServices()</text>
  <text x="820" y="194" text-anchor="middle" font-size="11" fill="#9a6b15">AddScoped&lt;IRestaurantService, RestaurantService&gt;()</text>
  <text x="820" y="210" text-anchor="middle" font-size="11" fill="#9a6b15">AddScoped&lt;IRestaurantRepository, RestaurantRepository&gt;()</text>

  <!-- injection arrows -->
  <path d="M620,224 C620,260 580,270 580,298" class="req" stroke="#c08a2e" stroke-dasharray="5 4" marker-end="url(#inj)"/>
  <path d="M820,224 L820,298" stroke="#c08a2e" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#inj)"/>
  <path d="M1020,224 C1020,260 1040,270 1040,298" stroke="#c08a2e" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#inj)"/>
  <text x="700" y="252" text-anchor="middle" font-size="10.5" fill="#c08a2e" font-style="italic">injecte (constructeur primaire)</text>

  <!-- ════ Request / Response arrows between nodes (y band ~300..380) ════ -->
  <!-- A: Page -> ClientService (200..270) -->
  <line x1="200" y1="330" x2="268" y2="330" class="req" marker-end="url(#req)"/>
  <line x1="270" y1="350" x2="202" y2="350" class="res" marker-end="url(#res)"/>
  <text x="234" y="294" text-anchor="middle" class="lreq">appel</text>
  <text x="234" y="402" text-anchor="middle" class="lres">RestaurantDto</text>

  <!-- B: ClientService -> Controller (across HTTP, 430..500) -->
  <line x1="430" y1="330" x2="498" y2="330" class="req" marker-end="url(#req)"/>
  <line x1="500" y1="350" x2="432" y2="350" class="res" marker-end="url(#res)"/>
  <text x="465" y="288" text-anchor="middle" class="lreq">GET /Restaurant</text>
  <text x="465" y="408" text-anchor="middle" class="lres">200 OK + JSON</text>

  <!-- C: Controller -> Service (660..730) -->
  <line x1="660" y1="330" x2="728" y2="330" class="req" marker-end="url(#req)"/>
  <line x1="730" y1="350" x2="662" y2="350" class="res" marker-end="url(#res)"/>
  <text x="694" y="294" text-anchor="middle" class="lreq">RestaurantQuery</text>
  <text x="694" y="402" text-anchor="middle" class="lres">ServiceResult&lt;…Dto&gt;</text>

  <!-- D: Service -> Repository (890..960) -->
  <line x1="890" y1="330" x2="958" y2="330" class="req" marker-end="url(#req)"/>
  <line x1="960" y1="350" x2="892" y2="350" class="res" marker-end="url(#res)"/>
  <text x="924" y="294" text-anchor="middle" class="lreq">query</text>
  <text x="924" y="402" text-anchor="middle" class="lres">List&lt;Restaurant&gt;</text>

  <!-- E: Repository -> DB (1120..1190) -->
  <line x1="1120" y1="330" x2="1188" y2="330" class="req" marker-end="url(#req)"/>
  <line x1="1190" y1="350" x2="1122" y2="350" class="res" marker-end="url(#res)"/>
  <text x="1154" y="294" text-anchor="middle" class="lreq">EF Core / SQL</text>
  <text x="1154" y="402" text-anchor="middle" class="lres">entités</text>

  <!-- ════ NODES ════ -->
  <!-- Page -->
  <rect x="40" y="302" width="160" height="76" rx="10" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <text x="120" y="332" text-anchor="middle" class="nt">Page Blazor</text>
  <text x="120" y="351" text-anchor="middle" class="ns">Restaurants.razor</text>
  <text x="120" y="368" text-anchor="middle" class="nc">@inject IRestaurantService</text>

  <!-- Client service -->
  <rect x="270" y="302" width="160" height="76" rx="10" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <text x="350" y="330" text-anchor="middle" class="nt">RestaurantService</text>
  <text x="350" y="349" text-anchor="middle" class="ns">(HttpClient) client</text>
  <text x="350" y="366" text-anchor="middle" class="nc">GetFromJsonAsync&lt;…&gt;</text>

  <!-- Controller -->
  <rect x="500" y="302" width="160" height="76" rx="10" fill="#fff" stroke="#d9822b" stroke-width="2"/>
  <text x="580" y="330" text-anchor="middle" class="nt">Controller</text>
  <text x="580" y="349" text-anchor="middle" class="ns">RestaurantController</text>
  <text x="580" y="366" text-anchor="middle" class="nc">result.ToOkResult()</text>

  <!-- Service (mapping) -->
  <rect x="730" y="302" width="160" height="76" rx="10" fill="#f3eefb" stroke="#7e57c2" stroke-width="2.4"/>
  <text x="810" y="330" text-anchor="middle" class="nt">Service</text>
  <text x="810" y="349" text-anchor="middle" class="ns">RestaurantService</text>
  <text x="810" y="366" text-anchor="middle" fill="#7e57c2" font-size="10.5" font-weight="700">★ Mapping Entité → DTO</text>

  <!-- Repository -->
  <rect x="960" y="302" width="160" height="76" rx="10" fill="#fff" stroke="#1f8a70" stroke-width="2"/>
  <text x="1040" y="330" text-anchor="middle" class="nt">Repository</text>
  <text x="1040" y="349" text-anchor="middle" class="ns">RestaurantRepository</text>
  <text x="1040" y="366" text-anchor="middle" class="nc">entités EF uniquement</text>

  <!-- DB cylinder -->
  <g>
    <path d="M1190,316 a80,14 0 0 1 160,0 v48 a80,14 0 0 1 -160,0 z" fill="#fff" stroke="#336791" stroke-width="2"/>
    <ellipse cx="1270" cy="316" rx="80" ry="14" fill="#fff" stroke="#336791" stroke-width="2"/>
    <text x="1270" y="344" text-anchor="middle" class="nt">PostgreSQL</text>
    <text x="1270" y="362" text-anchor="middle" class="ns">AppDbContext</text>
  </g>

  <!-- ════ Shared DTO pill ════ -->
  <rect x="300" y="470" width="590" height="64" rx="12" fill="#f3eefb" stroke="#7e57c2" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="595" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#5e3aa6">RestaurantDto — type partagé (DeliverTableSharedLibrary)</text>
  <text x="595" y="518" text-anchor="middle" font-size="11.5" fill="#5e3aa6">Le serveur le sérialise en JSON ; le client le désérialise dans le MÊME type. Aucun mapping côté client.</text>
  <line x1="350" y1="378" x2="350" y2="470" stroke="#7e57c2" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="810" y1="378" x2="810" y2="470" stroke="#7e57c2" stroke-width="1.3" stroke-dasharray="4 4"/>

  <!-- ════ Legend ════ -->
  <rect x="40" y="580" width="1320" height="90" rx="10" fill="#fff" stroke="#e1e7ec"/>
  <text x="60" y="606" font-size="13" font-weight="700" fill="#3e4c59">Lecture</text>

  <line x1="60" y1="628" x2="100" y2="628" class="req" marker-end="url(#req)"/>
  <text x="110" y="632" font-size="12" fill="#3e4c59">Requête : la Page appelle le service client → HTTP → Controller → Service → Repository → SQL.</text>

  <line x1="60" y1="652" x2="100" y2="652" class="res" marker-end="url(#res)"/>
  <text x="110" y="656" font-size="12" fill="#3e4c59">Réponse : l'entité remonte ; le Service la mappe en DTO (ServiceResult), le Controller renvoie 200 + JSON ; le client désérialise et la Page affiche.</text>

  <line x1="800" y1="628" x2="840" y2="628" stroke="#c08a2e" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#inj)"/>
  <text x="850" y="632" font-size="12" fill="#3e4c59">Injection (DI) : le conteneur IoC injecte les interfaces via le constructeur primaire — chaque couche dépend d'une abstraction (I…).</text>
  <text x="850" y="656" font-size="12" fill="#6b7280">Règle d'architecture : Controller (HTTP) → Service (logique + mapping) → Repository (accès données, entités seules).</text>
</svg>
