<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="860" viewBox="0 0 1240 860" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#5a6573"/>
    </marker>
    <marker id="arrow-port" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2e8b57"/>
    </marker>
    <style>
      .net-label { font-size: 15px; font-weight: 700; letter-spacing: .5px; }
      .subnet    { font-size: 12px; fill: #6b7280; }
      .node-title{ font-size: 15px; font-weight: 700; fill: #1f2933; }
      .node-sub  { font-size: 11px; fill: #6b7280; }
      .node-port { font-size: 10.5px; font-weight: 600; }
      .ip        { font-size: 10px; fill: #9aa5b1; }
      .edge      { stroke: #5a6573; stroke-width: 1.6; fill: none; }
      .edge-port { stroke: #2e8b57; stroke-width: 1.6; fill: none; stroke-dasharray: 5 4; }
      .legend    { font-size: 12px; fill: #3e4c59; }
    </style>
  </defs>

  <rect x="0" y="0" width="1240" height="860" fill="#fbfcfd"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#1f2933">DeliverTable — Topologie des conteneurs Docker (dev)</text>
  <text x="40" y="72" font-size="13" fill="#6b7280">docker-dev.yaml · les flèches pleines = depends_on (ordre de démarrage / dépendance) · les flèches vertes = ports exposés sur l'hôte</text>

  <!-- ── Network boxes ───────────────────────────────────────── -->
  <rect x="30" y="110" width="450" height="640" rx="14" fill="#e8f1fc" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="52" y="138" class="net-label" fill="#2c6cb0">dt-frontend-net</text>
  <text x="52" y="156" class="subnet">subnet 192.168.50.0/24</text>

  <rect x="500" y="110" width="710" height="700" rx="14" fill="#eaf6ec" stroke="#4caf7d" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="522" y="138" class="net-label" fill="#2e8b57">dt-backend-net</text>
  <text x="522" y="156" class="subnet">subnet 192.168.60.0/24</text>

  <!-- ── Host / Browser ──────────────────────────────────────── -->
  <rect x="110" y="180" width="160" height="50" rx="10" fill="#ffffff" stroke="#9aa5b1" stroke-width="1.5"/>
  <text x="190" y="202" text-anchor="middle" class="node-title">Navigateur</text>
  <text x="190" y="220" text-anchor="middle" class="node-sub">Hôte / utilisateur</text>

  <!-- ════════ EDGES (drawn before nodes) ════════ -->
  <!-- host port: browser -> proxy -->
  <line x1="190" y1="230" x2="190" y2="300" class="edge-port" marker-end="url(#arrow-port)"/>
  <text x="198" y="268" class="node-port" fill="#2e8b57">PROXY_PORT → 80</text>

  <!-- proxy depends_on frontend -->
  <line x1="190" y1="360" x2="190" y2="470" class="edge" marker-end="url(#arrow)"/>
  <!-- proxy depends_on backend -->
  <path d="M270,330 C330,330 350,400 410,400" class="edge" marker-end="url(#arrow)"/>

  <!-- backend depends_on database -->
  <path d="M570,388 C610,360 640,250 660,212" class="edge" marker-end="url(#arrow)"/>
  <!-- backend depends_on redis -->
  <path d="M570,400 C620,400 620,400 660,400" class="edge" marker-end="url(#arrow)"/>
  <!-- backend depends_on garage -->
  <path d="M570,412 C615,440 640,510 660,540" class="edge" marker-end="url(#arrow)"/>
  <!-- backend depends_on rabbitmq -->
  <path d="M490,430 C490,560 600,650 658,668" class="edge" marker-end="url(#arrow)"/>

  <!-- s3-manager depends_on garage -->
  <line x1="900" y1="565" x2="822" y2="565" class="edge" marker-end="url(#arrow)"/>

  <!-- worker depends_on database -->
  <path d="M1000,250 C880,250 840,210 822,196" class="edge" marker-end="url(#arrow)"/>
  <!-- worker depends_on rabbitmq -->
  <path d="M1000,280 C900,360 830,560 822,650" class="edge" marker-end="url(#arrow)"/>

  <!-- scheduler depends_on database -->
  <path d="M1000,700 C720,720 700,300 700,212" class="edge" marker-end="url(#arrow)"/>
  <!-- scheduler depends_on rabbitmq -->
  <line x1="1000" y1="690" x2="822" y2="690" class="edge" marker-end="url(#arrow)"/>

  <!-- host ports (green dashed) on backend-net services -->
  <line x1="740" y1="212" x2="740" y2="250" class="edge-port"/>
  <text x="746" y="240" class="node-port" fill="#2e8b57">DB_PORT → 5432</text>

  <!-- ════════ NODES ════════ -->
  <!-- proxy -->
  <rect x="110" y="300" width="160" height="60" rx="10" fill="#ffffff" stroke="#d9822b" stroke-width="2"/>
  <text x="190" y="324" text-anchor="middle" class="node-title">proxy</text>
  <text x="190" y="342" text-anchor="middle" class="node-sub">Reverse proxy (nginx)</text>
  <text x="262" y="356" text-anchor="end" class="ip">.50.10</text>

  <!-- frontend -->
  <rect x="110" y="470" width="160" height="60" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="190" y="494" text-anchor="middle" class="node-title">frontend</text>
  <text x="190" y="512" text-anchor="middle" class="node-sub">Blazor WASM</text>
  <text x="262" y="526" text-anchor="end" class="ip">.50.20</text>

  <!-- backend (bridge between the two nets) -->
  <rect x="410" y="370" width="160" height="62" rx="10" fill="#f3eefb" stroke="#7e57c2" stroke-width="2.5"/>
  <text x="490" y="394" text-anchor="middle" class="node-title">backend</text>
  <text x="490" y="411" text-anchor="middle" class="node-sub">ASP.NET Core API</text>
  <text x="490" y="426" text-anchor="middle" class="ip">.50.30 · .60.10 (pont)</text>

  <!-- database -->
  <rect x="660" y="152" width="160" height="60" rx="10" fill="#ffffff" stroke="#336791" stroke-width="2"/>
  <text x="740" y="176" text-anchor="middle" class="node-title">database</text>
  <text x="740" y="194" text-anchor="middle" class="node-sub">PostgreSQL</text>
  <text x="812" y="208" text-anchor="end" class="ip">.60.20</text>

  <!-- redis -->
  <rect x="660" y="370" width="160" height="60" rx="10" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <text x="740" y="394" text-anchor="middle" class="node-title">redis</text>
  <text x="740" y="412" text-anchor="middle" class="node-sub">Cache · 6379</text>
  <text x="812" y="426" text-anchor="end" class="ip">.60.50</text>

  <!-- garage -->
  <rect x="660" y="540" width="160" height="60" rx="10" fill="#ffffff" stroke="#2e8b57" stroke-width="2"/>
  <text x="740" y="564" text-anchor="middle" class="node-title">garage</text>
  <text x="740" y="582" text-anchor="middle" class="node-sub">Object storage S3 · 3900</text>
  <text x="812" y="596" text-anchor="end" class="ip">.60.30</text>

  <!-- s3-manager -->
  <rect x="900" y="540" width="160" height="60" rx="10" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
  <text x="980" y="564" text-anchor="middle" class="node-title">s3-manager</text>
  <text x="980" y="582" text-anchor="middle" class="node-sub">UI Garage · 8080</text>
  <text x="1052" y="596" text-anchor="end" class="ip">.60.40</text>

  <!-- rabbitmq -->
  <rect x="660" y="658" width="160" height="60" rx="10" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="740" y="682" text-anchor="middle" class="node-title">rabbitmq</text>
  <text x="740" y="700" text-anchor="middle" class="node-sub">Broker · 5672 / 15672</text>
  <text x="812" y="714" text-anchor="end" class="ip">.60.70</text>

  <!-- worker -->
  <rect x="1000" y="220" width="160" height="60" rx="10" fill="#ffffff" stroke="#52606d" stroke-width="2"/>
  <text x="1080" y="244" text-anchor="middle" class="node-title">worker</text>
  <text x="1080" y="262" text-anchor="middle" class="node-sub">Tâches de fond · SMTP</text>
  <text x="1152" y="276" text-anchor="end" class="ip">.60.80</text>

  <!-- scheduler -->
  <rect x="1000" y="660" width="160" height="60" rx="10" fill="#ffffff" stroke="#52606d" stroke-width="2"/>
  <text x="1080" y="684" text-anchor="middle" class="node-title">scheduler</text>
  <text x="1080" y="702" text-anchor="middle" class="node-sub">Tâches planifiées</text>
  <text x="1152" y="716" text-anchor="end" class="ip">.60.90</text>

  <!-- ════════ LEGEND ════════ -->
  <rect x="40" y="772" width="1160" height="64" rx="10" fill="#ffffff" stroke="#e1e7ec"/>
  <line x1="60" y1="794" x2="100" y2="794" class="edge" marker-end="url(#arrow)"/>
  <text x="112" y="798" class="legend">depends_on (condition: service_healthy)</text>

  <line x1="400" y1="794" x2="440" y2="794" class="edge-port" marker-end="url(#arrow-port)"/>
  <text x="452" y="798" class="legend">Port exposé sur l'hôte</text>

  <rect x="640" y="785" width="22" height="16" rx="4" fill="#e8f1fc" stroke="#4a90d9"/>
  <text x="672" y="798" class="legend">Réseau frontend</text>

  <rect x="800" y="785" width="22" height="16" rx="4" fill="#eaf6ec" stroke="#4caf7d"/>
  <text x="832" y="798" class="legend">Réseau backend</text>

  <rect x="960" y="785" width="22" height="16" rx="4" fill="#f3eefb" stroke="#7e57c2" stroke-width="2"/>
  <text x="992" y="798" class="legend">backend = pont entre les 2 réseaux</text>

  <text x="60" y="824" class="legend" fill="#6b7280">Volumes (non représentés) : postgres-data, garage-data, rabbitmq-data, nuget-cache · suffixe IP = octet final dans le subnet du réseau.</text>
</svg>
