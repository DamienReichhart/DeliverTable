<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- User Story card -->
  <rect x="30" y="20" width="460" height="380" rx="16" fill="#ffffff" stroke="#e8772e" stroke-width="2.5" filter="url(#shadow)"/>

