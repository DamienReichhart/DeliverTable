  <rect x="78" y="336" width="18" height="18" rx="4" fill="#ffffff" stroke="#9aa1ab" stroke-width="1.5"/>
  <text x="116" y="344" font-size="14" font-weight="600" fill="#2b3038">Tâche 4</text>
