  <text x="104" y="52" font-size="18" font-weight="700" fill="#2b3038">User Story</text>
  <rect x="104" y="62" width="170" height="9" rx="4" fill="#f3c9a4"/>

  <!-- Task 1 -->
  <rect x="56" y="108" width="408" height="60" rx="10" fill="#f7f8fa" stroke="#d8dce2" stroke-width="1.5"/>
