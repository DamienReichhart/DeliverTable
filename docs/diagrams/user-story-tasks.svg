  <rect x="78" y="196" width="18" height="18" rx="4" fill="#ffffff" stroke="#9aa1ab" stroke-width="1.5"/>
  <text x="116" y="204" font-size="14" font-weight="600" fill="#2b3038">Tâche 2</text>
  <rect x="116" y="214" width="240" height="8" rx="4" fill="#e3e6ea"/>

  <!-- Task 3 -->
  <rect x="56" y="248" width="408" height="60" rx="10" fill="#f7f8fa" stroke="#d8dce2" stroke-width="1.5"/>
